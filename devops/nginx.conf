# Nginx reverse proxy configuration for AetherOS AI Platform

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream springboot_backend {
        server springboot-app:8080;
    }

    upstream fastapi_backend {
        server fastapi-app:8000;
    }

    upstream frontend_client {
        server frontend-client:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Frontend SPA routing
        location / {
            proxy_pass http://frontend_client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Spring Boot Core Endpoints routing
        location /api/shipments {
            proxy_pass http://springboot_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. FastAPI AI Engine Endpoints routing
        location /api/predict {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/chat {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Disable buffering for SSE (streaming chat bubbles)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
        }
    }
}
